{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4 text-center">Reservar Sala</h2>
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="nombre" class="form-label">NOMBRE</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ej: Nombre" required>
                    </div>
                    <div class="mb-3">
                        <label for="rut" class="form-label">RUT</label>
                        <input type="text" class="form-control" id="rut" name="rut" placeholder="Ej: 12.345.678-9" required>
                    </div>
                    <div class="d-flex justify-content-center mb-1">
                    <button type="submit" class="btn btn-success w-70">Confirmar Reserva</button>
                    </div>
                    <div class="d-flex justify-content-center">
                    <a href="{% url 'index' %}" class="btn btn-secondary">Volver</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
